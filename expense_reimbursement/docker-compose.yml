version: "3.9"

# Expense Reimbursement Demo — local infrastructure
# Provides MySQL, MongoDB, and the Skardi federated query server.
# Lance data is file-based and mounted into the Skardi container from ./data/.
#
# Usage:
#   docker compose up -d           # start everything (including Skardi)
#   docker compose up -d mysql mongo  # start only databases (for traditional backend)
#   docker compose down            # stop
#   docker compose down -v         # stop + wipe volumes

services:
  mysql:
    image: mysql:8.0
    container_name: expense_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: expense_db
      MYSQL_USER: skardi
      MYSQL_PASSWORD: skardi123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./seed/init_mysql.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7.0
    container_name: expense_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpass
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1})"]
      interval: 10s
      timeout: 5s
      retries: 5

  skardi:
    image: ghcr.io/skardilabs/skardi/skardi-server:latest
    container_name: expense_skardi
    environment:
      MYSQL_USER: skardi
      MYSQL_PASSWORD: skardi123
      MONGO_USER: root
      MONGO_PASS: rootpass
    ports:
      - "8081:8081"
    volumes:
      - ./ctx_expense_docker.yaml:/app/ctx.yaml:ro
      - ./pipelines:/app/pipelines:ro
      - ./data:/app/data:ro
    command: ["--ctx", "/app/ctx.yaml", "--pipeline", "/app/pipelines", "--port", "8081"]
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_healthy

volumes:
  mysql_data:
  mongo_data:
